<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rift Reader — Flipword PDF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      background: #fafafa;
      color: #111;
    }
    .header {
      padding: 16px 24px;
      border-bottom: 2px solid #111;
      font-family: 'SF Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header span { font-size: 11px; color: #999; letter-spacing: 1px; }
    .upload-area {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 40px;
    }
    .upload-box {
      border: 2px dashed #ddd;
      padding: 60px 80px;
      text-align: center;
      cursor: pointer;
    }
    .upload-box:hover { border-color: #111; }
    .upload-box h2 { font-size: 18px; margin-bottom: 8px; }
    .upload-box p { font-size: 13px; color: #999; }
    #pdf-container { display: none; padding: 24px; }
    .status { font-size: 12px; color: #999; font-family: 'SF Mono', monospace; padding: 8px 24px; }
  </style>
</head>
<body>
  <div class="header">
    Rift Reader
    <span>FLIPWORD PDF · PROTOTYPE</span>
  </div>
  <div class="upload-area" id="upload-area">
    <label class="upload-box">
      <h2>Drop a PDF here</h2>
      <p>or click to select a file</p>
      <input type="file" accept=".pdf" style="display: none;" id="pdf-input" />
    </label>
  </div>
  <div class="status" id="status"></div>
  <div id="pdf-container"></div>

  <script>
    // Prototype: just show that the page works and can accept a PDF
    const input = document.getElementById('pdf-input');
    const status = document.getElementById('status');

    input.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        status.textContent = `Loaded: ${file.name} (${(file.size / 1024).toFixed(1)} KB) — pdf.js integration pending`;
        document.getElementById('upload-area').style.display = 'none';
      }
    });
  </script>
</body>
</html>
